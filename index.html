<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rossler</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6; color: #1a1a1a; background: #ffffff; text-align: center;
    }
    .wrap { max-width: 620px; padding: 2rem 1.25rem; }
    h1 { font-size: 2rem; margin: 0 0 .5rem; }
    p { color: #555; }
    a { color: #0b66c3; }
    @media (prefers-color-scheme: dark) {
      body { color: #e8e8e8; background: #111; }
      p { color: #9a9a9a; }
      a { color: #6cb6ff; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Rossler</h1>
    <p>Content operations, publishing, and analytics tools for authorized brand and business accounts.</p>
    <p><a href="/privacy-policy/">Privacy Policy</a></p>
  </main>
</body>
</html>
